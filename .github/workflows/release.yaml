name: Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-24.04
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release):')
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION=$(jq -r .version opencode/package.json)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "First release: v$VERSION"
            exit 0
          fi

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format='%s')

          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No commits since $LATEST_TAG"
            exit 0
          fi

          MAJOR=false
          MINOR=false
          PATCH=false

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since $LATEST_TAG"
            exit 0
          fi

          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          if $MAJOR; then
            major=$((major + 1)); minor=0; patch=0
          elif $MINOR; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          VERSION="${major}.${minor}.${patch}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION"

  release:
    name: Release
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: opencode
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Set release version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Commit and tag
        working-directory: .
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add opencode/package.json
          git diff --staged --quiet || git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
